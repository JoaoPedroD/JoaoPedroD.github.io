bio: |
  I am a second-year PhD candidate in Electrical Engineering at EPFL, affiliated
  with Idiap Research Institute, working in collaboration with Honda Research
  Institute Europe on neurosymbolic AI for intent-driven engineering design. My
  research bridges natural-language intent with physically-grounded engineering
  constraints, enabling LLMs to produce verifiable designs for complex systems.
  Broader interests: large language models, neurosymbolic reasoning, inductive
  logic programming, and AI for science and engineering. Before Switzerland I
  completed my MSc and BSc in Computer Science at UFRJ (Rio de Janeiro), and
  interned at IBM Research on LLM-driven knowledge extraction for materials
  discovery.

